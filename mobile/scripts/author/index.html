<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>오프닝 설명 편집기</title>
<style>
  :root { --bg:#f4f5f8; --card:#fff; --line:#dfe3ea; --text:#1c2230; --muted:#6b7280; --primary:#3452d9; --light:#efe7d8; --dark:#8a7256; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; background:var(--bg); color:var(--text); }
  header { padding:12px 20px; background:var(--card); border-bottom:1px solid var(--line); display:flex; gap:14px; align-items:center; flex-wrap:wrap; }
  header h1 { font-size:16px; margin:0; }
  select { padding:6px 8px; border:1px solid var(--line); border-radius:8px; background:#fff; font-size:14px; }
  main { display:grid; grid-template-columns: 380px 1fr; gap:20px; padding:20px; align-items:start; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px; }
  #board { width:352px; height:352px; display:grid; grid-template-columns:repeat(8,1fr); grid-template-rows:repeat(8,1fr); border-radius:8px; overflow:hidden; margin:0 auto; }
  .sq { display:flex; align-items:center; justify-content:center; font-size:34px; line-height:1; user-select:none; }
  .sq.l { background:var(--light); } .sq.d { background:var(--dark); }
  .pc.w { color:#fff; text-shadow:0 0 1px #333, 0 1px 2px rgba(0,0,0,.4); }
  .pc.b { color:#111; }
  .sq.sel { box-shadow: inset 0 0 0 4px var(--primary); }
  .sq.tgt { box-shadow: inset 0 0 0 3px rgba(52,82,217,.55); cursor:pointer; }
  .sq { cursor:pointer; }
  .nav { display:flex; gap:8px; justify-content:center; margin-top:12px; }
  button { padding:8px 12px; border:1px solid var(--line); border-radius:8px; background:#fff; font-size:14px; cursor:pointer; }
  button.primary { background:var(--primary); color:#fff; border-color:var(--primary); }
  button:disabled { opacity:.4; cursor:default; }
  .moves { display:flex; flex-wrap:wrap; gap:6px; margin-top:14px; }
  .mv { padding:4px 8px; border-radius:6px; background:#eef1f7; font-size:13px; cursor:pointer; }
  .mv.cur { background:var(--primary); color:#fff; }
  .mv.has::after { content:"•"; margin-left:4px; color:var(--primary); }
  .mv.cur.has::after { color:#fff; }
  label { display:block; font-size:12px; color:var(--muted); margin:14px 0 6px; }
  textarea { width:100%; min-height:90px; padding:10px; border:1px solid var(--line); border-radius:8px; font:inherit; resize:vertical; }
  .ref { display:grid; grid-template-columns: 1fr 1.6fr auto auto; gap:6px; margin-bottom:6px; }
  .ref input, .ref select { padding:6px; border:1px solid var(--line); border-radius:6px; font-size:13px; min-width:0; }
  .row { display:flex; gap:8px; align-items:center; margin-top:12px; flex-wrap:wrap; }
  .muted { color:var(--muted); font-size:12px; }
  a.ext { font-size:13px; color:var(--primary); }
  #status { font-size:13px; color:var(--muted); }
</style>
</head>
<body>
<header>
  <h1>오프닝 설명 편집기</h1>
  <select id="opening"></select>
  <select id="line"></select>
  <span id="status"></span>
  <button id="newBranch" style="margin-left:auto">＋ 새 갈래 추가</button>
</header>
<main>
  <div class="card">
    <div id="board"></div>
    <div class="nav">
      <button id="prev">◀ 이전</button>
      <span id="ply" class="muted" style="align-self:center"></span>
      <button id="next">다음 ▶</button>
    </div>
    <div class="moves" id="moves"></div>
  </div>
  <div class="card" id="editorPanel">
    <div class="row" style="justify-content:space-between">
      <strong id="moveTitle">—</strong>
      <a class="ext" id="lichess" target="_blank" rel="noreferrer">Lichess 분석에서 열기 ↗</a>
    </div>
    <label>설명 (한국어)</label>
    <textarea id="text" placeholder="이 수에 대한 설명…"></textarea>
    <label>레퍼런스 (출처 + 링크)</label>
    <div id="refs"></div>
    <div class="row">
      <button id="addRef">+ 레퍼런스 추가</button>
      <button class="primary" id="save">저장</button>
      <span id="saveMsg" class="muted"></span>
    </div>
    <p class="muted" style="margin-top:16px">저장하면 <code>src/data/openingNotes.json</code>에 바로 기록됩니다. 남의 스터디 <b>텍스트를 복사하지 말고</b>, 링크로만 다세요.</p>
  </div>
  <div class="card" id="branchPanel" style="display:none">
    <div class="row" style="justify-content:space-between">
      <strong>새 갈래(상대 응수) 추가</strong>
      <button id="branchCancel">취소</button>
    </div>
    <p class="muted" id="branchFrom"></p>
    <p><b>추가 수순:</b> <span id="branchSeq" class="muted">—</span></p>
    <div class="row"><button id="branchUndo">↶ 마지막 수 취소</button></div>
    <label>갈래 이름</label>
    <input id="branchName" placeholder="예: 교환 · 5...Bg4" style="width:100%;padding:10px;border:1px solid var(--line);border-radius:8px;font:inherit" />
    <label>종류</label>
    <select id="branchKind"><option value="variation">변형</option><option value="punish">응징</option></select>
    <div class="row" style="margin-top:12px"><button class="primary" id="branchSave">갈래 저장</button><span id="branchMsg" class="muted"></span></div>
    <p class="muted" style="margin-top:12px">보드에서 상대(및 이후) 수를 두어 갈래를 만든 뒤 저장하세요. 저장하면 앱 트리에 즉시 나타나고, 위에서 그 라인을 골라 설명을 답니다.</p>
  </div>
</main>
<script>
const GLYPH = { k:'♚', q:'♛', r:'♜', b:'♝', n:'♞', p:'♟' };
const KINDS = ['explorer','study','article','book','video'];
let data, oi=0, li=0, ply=0;
let notes = {}; // local mirror of server notes

const $ = (id) => document.getElementById(id);

function line() { return data.openings[oi].lines[li]; }
function flipped() { return data.openings[oi].sideToLearn === 'b'; }

const FILES = ['a','b','c','d','e','f','g','h'];
function renderBoard(fen, opts) {
  opts = opts || {};
  const board = $('board'); board.innerHTML = '';
  const rows = fen.split(' ')[0].split('/'); // rows[0] = rank 8
  const grid = rows.map((r) => {
    const row = [];
    for (const ch of r) { if (/\d/.test(ch)) for (let i=0;i<+ch;i++) row.push(null); else row.push(ch); }
    return row;
  });
  const order = flipped() ? [7,6,5,4,3,2,1,0] : [0,1,2,3,4,5,6,7];
  for (const ri of order) {
    for (const ci of order) {
      const pc = grid[ri][ci];
      const square = FILES[ci] + (8 - ri);
      const sq = document.createElement('div');
      sq.className = 'sq ' + ((ri + ci) % 2 === 1 ? 'd' : 'l');
      if (opts.selected === square) sq.classList.add('sel');
      if (opts.targets && opts.targets.includes(square)) sq.classList.add('tgt');
      if (pc) {
        const span = document.createElement('span');
        span.className = 'pc ' + (pc === pc.toUpperCase() ? 'w' : 'b');
        span.textContent = GLYPH[pc.toLowerCase()];
        sq.appendChild(span);
      }
      if (opts.onSquare) sq.onclick = () => opts.onSquare(square);
      board.appendChild(sq);
    }
  }
}

function moveLabel(i, san) {
  const n = Math.floor(i/2) + 1;
  return i % 2 === 0 ? `${n}. ${san}` : `${n}… ${san}`;
}

function currentNote() {
  const key = line().key;
  return (notes[key] && notes[key][ply]) || { text:'', refs:[] };
}

function renderRefs(refs) {
  const box = $('refs'); box.innerHTML = '';
  refs.forEach((ref, idx) => {
    const div = document.createElement('div'); div.className = 'ref';
    const label = document.createElement('input'); label.placeholder='표시명 (예: Lichess 마스터 DB)'; label.value=ref.label||'';
    const url = document.createElement('input'); url.placeholder='https://…'; url.value=ref.url||'';
    const kind = document.createElement('select');
    KINDS.forEach(k => { const o=document.createElement('option'); o.value=k; o.textContent=k; if(k===ref.kind)o.selected=true; kind.appendChild(o); });
    const del = document.createElement('button'); del.textContent='✕';
    label.oninput = () => ref.label = label.value;
    url.oninput = () => ref.url = url.value;
    kind.onchange = () => ref.kind = kind.value;
    del.onclick = () => { refs.splice(idx,1); renderRefs(refs); };
    div.append(label, url, kind, del); box.appendChild(div);
  });
}

let editRefs = [];
function renderEditor() {
  const l = line();
  const san = l.moves[ply];
  $('moveTitle').textContent = san ? `${moveLabel(ply, san)}` : '—';
  $('ply').textContent = `${ply+1} / ${l.moves.length}`;
  const fen = l.fens[ply];
  renderBoard(fen);
  $('lichess').href = 'https://lichess.org/analysis/' + fen.replace(/ /g,'_');
  const note = currentNote();
  $('text').value = note.text || '';
  editRefs = (note.refs || []).map(r => ({...r}));
  renderRefs(editRefs);
  $('saveMsg').textContent = '';
  // moves strip
  const strip = $('moves'); strip.innerHTML='';
  l.moves.forEach((m, i) => {
    const el = document.createElement('span');
    const has = notes[l.key] && notes[l.key][i] && notes[l.key][i].text;
    el.className = 'mv' + (i===ply?' cur':'') + (has?' has':'');
    el.textContent = moveLabel(i, m);
    el.onclick = () => { ply=i; renderEditor(); };
    strip.appendChild(el);
  });
  $('prev').disabled = ply<=0;
  $('next').disabled = ply>=l.moves.length-1;
}

function fillSelects() {
  const os = $('opening'); os.innerHTML='';
  data.openings.forEach((o,i)=>{ const opt=document.createElement('option'); opt.value=i; opt.textContent=o.name+(o.sideToLearn==='b'?' (흑)':' (백)'); os.appendChild(opt); });
  os.value = oi;
  const ls = $('line'); ls.innerHTML='';
  data.openings[oi].lines.forEach((l,i)=>{ const opt=document.createElement('option'); opt.value=i; opt.textContent=`${l.name} [${l.kind}]`; ls.appendChild(opt); });
  ls.value = li;
}

async function save() {
  const key = line().key;
  const body = { key, ply, note: { text: $('text').value, refs: editRefs.filter(r=>r.url&&r.label) } };
  const res = await fetch('/api/note', { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify(body) });
  const out = await res.json();
  if (out.ok) {
    notes[key] = notes[key] || {};
    if (out.saved) notes[key][ply] = out.saved; else delete notes[key][ply];
    $('saveMsg').textContent = '저장됨 ✓';
    renderEditor();
  } else {
    $('saveMsg').textContent = '오류: ' + (out.error||'실패');
  }
}

// ---- 새 갈래(상대 응수) 추가 모드 ----
let branch = null; // { path:[], newMoves:[], selected, fen, legal:[] }

function closeBranch() { branch = null; $('branchPanel').style.display = 'none'; $('editorPanel').style.display = ''; }

function enterBranch() {
  const l = line();
  branch = { path: l.moves.slice(0, ply + 1), newMoves: [], selected: null, fen: '', legal: [] };
  $('editorPanel').style.display = 'none';
  $('branchPanel').style.display = '';
  $('branchName').value = ''; $('branchMsg').textContent = '';
  $('branchFrom').textContent = `분기 지점: ${branch.path.length}수 후 — ${branch.path.join(' ')}`;
  loadBranchPosition();
}

async function loadBranchPosition() {
  const moves = [...branch.path, ...branch.newMoves];
  const res = await (await fetch('/api/position', { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify({ moves }) })).json();
  if (!res.ok) { $('branchMsg').textContent = res.error || '오류'; return; }
  branch.fen = res.fen; branch.legal = res.moves; branch.selected = null;
  renderBranch();
}

function renderBranch() {
  const targets = branch.selected ? branch.legal.filter(m => m.from === branch.selected).map(m => m.to) : [];
  renderBoard(branch.fen, { onSquare: onBranchSquare, selected: branch.selected, targets });
  $('branchSeq').textContent = branch.newMoves.length
    ? branch.newMoves.map((s, i) => moveLabel(branch.path.length + i, s)).join(' ')
    : '—';
}

function onBranchSquare(square) {
  if (!branch) return;
  if (branch.selected) {
    if (square === branch.selected) { branch.selected = null; return renderBranch(); }
    const mv = branch.legal.find(m => m.from === branch.selected && m.to === square);
    if (mv) { branch.newMoves.push(mv.san); return loadBranchPosition(); }
    if (branch.legal.some(m => m.from === square)) { branch.selected = square; return renderBranch(); }
    branch.selected = null; return renderBranch();
  }
  if (branch.legal.some(m => m.from === square)) { branch.selected = square; renderBranch(); }
}

async function saveBranch() {
  if (!branch || branch.newMoves.length === 0) { $('branchMsg').textContent = '수를 최소 1개 두세요'; return; }
  const name = $('branchName').value.trim();
  if (!name) { $('branchMsg').textContent = '이름을 입력하세요'; return; }
  const body = { openingId: data.openings[oi].id, name, kind: $('branchKind').value, branchPly: branch.path.length, moves: [...branch.path, ...branch.newMoves] };
  const res = await (await fetch('/api/branch', { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify(body) })).json();
  if (!res.ok) { $('branchMsg').textContent = res.error || '저장 실패'; return; }
  const savedId = res.branch.id;
  data = await (await fetch('/api/data')).json();
  notes = data.notes || {};
  closeBranch();
  fillSelects();
  const idx = data.openings[oi].lines.findIndex(l => l.id === savedId);
  if (idx >= 0) { li = idx; ply = 0; $('line').value = li; }
  renderEditor();
}

$('opening').onchange = e => { closeBranch(); oi=+e.target.value; li=0; ply=0; fillSelects(); renderEditor(); };
$('line').onchange = e => { closeBranch(); li=+e.target.value; ply=0; renderEditor(); };
$('prev').onclick = () => { if(ply>0){ply--; renderEditor();} };
$('next').onclick = () => { if(ply<line().moves.length-1){ply++; renderEditor();} };
$('addRef').onclick = () => { editRefs.push({label:'',url:'',kind:'explorer'}); renderRefs(editRefs); };
$('save').onclick = save;
$('newBranch').onclick = enterBranch;
$('branchCancel').onclick = closeBranch;
$('branchUndo').onclick = () => { if (branch && branch.newMoves.length) { branch.newMoves.pop(); loadBranchPosition(); } };
$('branchSave').onclick = saveBranch;

(async () => {
  data = await (await fetch('/api/data')).json();
  notes = data.notes || {};
  fillSelects();
  renderEditor();
  $('status').textContent = `${data.openings.length}개 오프닝`;
})();
</script>
</body>
</html>
