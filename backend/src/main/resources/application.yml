server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

chessko:
  cors:
    allowed-origins: ${CHESSKO_CORS_ALLOWED_ORIGINS:http://localhost:19006,http://localhost:8081,http://localhost:8082}
  rate-limit:
    enabled: ${CHESSKO_RATE_LIMIT_ENABLED:true}
    tokens-per-minute: ${CHESSKO_RATE_LIMIT_TOKENS_PER_MINUTE:60}
    # Set false if 8080 is reachable without a proxy in front — see RateLimitProperties.
    trust-forwarded-for: ${CHESSKO_RATE_LIMIT_TRUST_FORWARDED_FOR:true}
  engine:
    binary-path: ${STOCKFISH_PATH:/usr/local/bin/stockfish}
    pool-size: ${STOCKFISH_POOL_SIZE:4}
    hash-mb: 64
    move-time-ms: 800
    game-move-time-ms: ${STOCKFISH_GAME_MOVE_TIME_MS:200}
    borrow-timeout-ms: 2000
    extra-timeout-ms: 1500
  openai:
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    embedding-model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
    # 0 = model's native size (OpenAI). Set 1536 for Gemini (gemini-embedding-001) so its 3072-d
    # output is truncated to fit the vector(1536) store — see OpenAiProperties.
    embedding-dimensions: ${OPENAI_EMBEDDING_DIMENSIONS:0}
    chat-model: ${OPENAI_CHAT_MODEL:gpt-4o-mini}
    timeout-ms: 8000
  vectorstore:
    url: ${SUPABASE_URL:}
    service-key: ${SUPABASE_SERVICE_KEY:}
    match-function: ${SUPABASE_MATCH_FUNCTION:match_opening_principles}
    match-count: 3
    timeout-ms: 5000
  rag:
    seed-on-startup: ${CHESSKO_RAG_SEED_ON_STARTUP:false}
  vision:
    base-url: ${VISION_SERVICE_URL:http://localhost:8000}
    timeout-ms: 10000
